<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark circle bg -->
  <circle cx="32" cy="32" r="32" fill="#1A0A2E"/>
  <!-- Glow -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>
  <!-- Arc track -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2.5" transform="rotate(-90 32 32)"/>
  <!-- Arc fill — ~75% filled -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#g)" stroke-width="2.5"
    stroke-dasharray="163" stroke-dashoffset="41"
    stroke-linecap="round" transform="rotate(-90 32 32)"/>
  <!-- Dot at arc tip -->
  <circle cx="32" cy="6" r="4" fill="url(#g)"/>
  <!-- F letterform -->
  <rect x="22" y="18" width="4" height="28" rx="2" fill="url(#g)"/>
  <rect x="22" y="18" width="18" height="4" rx="2" fill="url(#g)"/>
  <rect x="22" y="30" width="13" height="4" rx="2" fill="url(#g)"/>
</svg>
