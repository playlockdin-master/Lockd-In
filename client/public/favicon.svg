<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Purple circle -->
  <circle cx="32" cy="32" r="32" fill="#7C3AED"/>
  <!-- Arc track (faint white) -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/>
  <!-- Arc fill 75% white -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="white" stroke-width="2.5"
    stroke-dasharray="113 38" stroke-linecap="round"
    transform="rotate(-90 32 32)"/>
  <!-- Small white dot at top of arc -->
  <circle cx="32" cy="8" r="4" fill="white"/>
  <!-- F letterform in white -->
  <rect x="22" y="19" width="4" height="26" rx="2" fill="white"/>
  <rect x="22" y="19" width="18" height="4" rx="2" fill="white"/>
  <rect x="22" y="30" width="13" height="4" rx="2" fill="white"/>
</svg>
